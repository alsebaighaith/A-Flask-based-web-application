{% extends "layout.html" %}

{% block content %}

<div class="container mt-5 text-center">

    <div class="card shadow p-5">

        <h1 style="font-size: 60px;">👤❌</h1>

        <h2 class="text-danger mt-3">
            Customer Not Found
        </h2>

        <p class="text-muted mt-3">
            No customer matches the name you entered.<br>
            Please check the spelling and try again.
        </p>

        <div class="mt-4">
            <a href="{{ url_for('customer') }}" class="btn btn-primary">
                🔙 Back to Search
            </a>

            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary ms-2">
                🏠 Home
            </a>
        </div>

    </div>

</div>

{% endblock %}
