{% extends "layout.html" %}

{% block content %}

<div class="container mt-5 text-center">

    <div class="card shadow p-5">

        <!-- Icon -->
        <div class="mb-4">
            <h1 style="font-size: 60px;">⚠️</h1>
        </div>

        <!-- Title -->
        <h2 class="text-danger mb-3">
            No rating
        </h2>

        <!-- Message -->
        <p class="text-muted">
            The rating you selected is not among the available ratings.

            Please select a valid rating.
        </p>

        <!-- Actions -->
        <div class="mt-4">
            <a href="{{ url_for('movies') }}" class="btn btn-primary">
                🔙 Return to the movie list
            </a>

            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary ms-2">
                🏠 Home Page
            </a>
        </div>

    </div>

</div>

{% endblock %}
